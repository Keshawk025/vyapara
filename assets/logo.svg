<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <defs>
    <linearGradient id="lwG" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#e879f9"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="rwG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00f6ff"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="flapG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="inG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="hG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c026d3"/>
      <stop offset="100%" stop-color="#00f6ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Handle arc -->
  <path d="M 72 76 A 28 28 0 0 1 128 76" fill="none" stroke="url(#hG)" stroke-width="9" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Bag flap right -->
  <polygon points="140,76 176,96 110,176 90,176" fill="url(#flapG)"/>
  <!-- Inner dark triangle -->
  <polygon points="80,76 120,76 100,142.6" fill="url(#inG)"/>
  <!-- Bag left face -->
  <polygon points="24,76 80,76 110,176 54,176" fill="url(#lwG)"/>
  <!-- Bag right face -->
  <polygon points="120,76 150,76 80,176 110,176" fill="url(#rwG)"/>
</svg>
